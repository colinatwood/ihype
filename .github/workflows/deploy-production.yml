name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Wake up Neon database
        run: |
          node -e "
          var pg = require('pg');
          var c = new pg.Client({connectionString: process.env.DIRECT_URL, connectionTimeoutMillis: 30000});
          c.connect(function(err) {
            if (err) { console.error('wake-up:', err.message); process.exit(0); }
            c.query('SELECT 1', function() { c.end(); console.log('DB ready'); });
          });
          "
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Mark broken migration as applied
        run: npx prisma migrate resolve --applied 20260507000001_radio_track_block_label || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run migrations
        run: |
          for i in 1 2 3; do
            npx prisma migrate deploy && exit 0
            echo "Migration attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=ihype --branch=main

      - name: Deploy cron Worker
        run: npx wrangler deploy --config wrangler.cron.toml
