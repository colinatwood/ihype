<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home · iHYPE.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ihype-shared.css">
<style>
/* ── Layout ── */
.home-grid{display:grid;grid-template-columns:1fr 300px;gap:1.2rem;align-items:start}
@media(max-width:900px){.home-grid{grid-template-columns:1fr}}

/* ── Greeting ── */
.greeting-card{padding:1.6rem 2rem;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg);display:flex;align-items:center;gap:1.4rem;margin-bottom:1.2rem}
.greeting-av{width:52px;height:52px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-size:1.3rem;font-weight:700;flex-shrink:0}
.greeting-av.fan{background:var(--r-fan)} .greeting-av.artist{background:var(--r-artist)} .greeting-av.venue{background:var(--r-venue)} .greeting-av.promoter{background:var(--r-promoter)}
.greeting-name{font-family:var(--f-d);font-size:1.35rem;font-weight:700;line-height:1.2}
.greeting-sub{font-size:.86rem;color:var(--ink-2);margin-top:.3rem}
.role-badge{font-family:var(--f-m);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:.2rem .55rem;border-radius:99px;color:#fff;margin-left:.55rem;vertical-align:middle}
.role-badge.fan{background:var(--r-fan)} .role-badge.artist{background:var(--r-artist)} .role-badge.venue{background:var(--r-venue)} .role-badge.promoter{background:var(--r-promoter)}

/* ── Quick actions ── */
.quick-actions{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:1.5rem}
.qa-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1rem;border-radius:var(--r-md);font-size:.84rem;font-weight:500;border:1px solid var(--line-2);background:var(--bg-2);color:var(--ink);text-decoration:none;transition:all .15s}
.qa-btn:hover{border-color:var(--line-3);transform:translateY(-1px)}
.qa-btn.primary{background:var(--ink);color:var(--bg);border-color:transparent}
.qa-btn.primary:hover{background:var(--accent)}

/* ── Section headings ── */
.section-head{font-family:var(--f-d);font-size:.96rem;font-weight:600;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between}
.section-head a{font-family:var(--f-m);font-size:.73rem;color:var(--ink-3);font-weight:400;text-decoration:none}
.section-head a:hover{color:var(--ink)}
.home-section{margin-bottom:1.6rem}

/* ── Stats grid (main area) ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1.6rem}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-tile{padding:1.1rem 1.2rem;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg)}
.stat-tile .num{font-family:var(--f-d);font-size:1.8rem;font-weight:700;line-height:1;color:var(--accent)}
.stat-tile .num.green{color:#4ade80}
.stat-tile .num.gold{color:#fbbf24}
.stat-tile .num.blue{color:var(--r-venue)}
.stat-tile .lbl{font-family:var(--f-m);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-top:.4rem;font-weight:600}
.stat-tile .sub{font-size:.76rem;color:var(--ink-2);margin-top:.2rem}

/* ── Shows list ── */
.shows-list{display:flex;flex-direction:column;gap:.55rem}
.show-card{display:grid;grid-template-columns:44px 1fr auto;gap:.9rem;padding:.9rem 1rem;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);align-items:center;transition:all .15s;text-decoration:none;color:inherit}
.show-card:hover{border-color:var(--line-3);transform:translateX(2px)}
.show-date{text-align:center}
.show-date .day{font-family:var(--f-d);font-size:1.4rem;font-weight:700;line-height:1;color:var(--accent)}
.show-date .mon{font-family:var(--f-m);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3)}
.show-info .nm{font-family:var(--f-d);font-size:.94rem;font-weight:600}
.show-info .mt{font-size:.76rem;color:var(--ink-2);margin-top:.15rem}
.badge{font-family:var(--f-m);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;padding:.22rem .55rem;border-radius:99px;border:1px solid var(--line-2);color:var(--ink-3);font-weight:500;white-space:nowrap}
.badge.live{color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
.badge.ticketed{color:var(--accent);border-color:rgba(216,58,22,.25)}
.badge.draft{color:var(--ink-3);border-color:var(--line)}

/* ── Geo bar chart ── */
.geo-list{display:flex;flex-direction:column;gap:.45rem}
.geo-row{display:grid;grid-template-columns:110px 1fr 40px;gap:.6rem;align-items:center;font-size:.8rem}
.geo-label{color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.geo-track{height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.geo-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.geo-count{font-family:var(--f-m);font-size:.72rem;color:var(--ink-3);text-align:right}

/* ── Sidebar cards ── */
.side-card{padding:1.1rem 1.3rem;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-lg);margin-bottom:.8rem}
.side-card-title{font-family:var(--f-m);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.65rem}
.kv-rows{display:flex;flex-direction:column}
.kv-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--line);font-size:.84rem}
.kv-row:last-child{border-bottom:none}
.kv-row .k{color:var(--ink-2)}
.kv-row .v{font-weight:600;color:var(--ink);font-family:var(--f-d)}
.nav-link-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .3rem;border-radius:var(--r-sm);font-size:.86rem;color:var(--ink);text-decoration:none;transition:background .12s}
.nav-link-item:hover{background:var(--surface-2)}
.nav-link-item .ico{font-size:.95rem;width:20px;text-align:center}

/* ── Skeleton / empty ── */
.skeleton{background:var(--line);border-radius:var(--r-sm);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.3}}
.empty-state{padding:1.8rem;text-align:center;color:var(--ink-3);font-size:.86rem;border:1.5px dashed var(--line-2);border-radius:var(--r-lg)}
</style>
</head>
<body>
<div class="site-shell">

<nav class="nav">
  <div class="nav-left">
    <a href="/" style="text-decoration:none;color:inherit"><div class="brand">i<em>HYPE</em></div></a>
    <div class="nav-links">
      <a href="/home" class="nav-link active">Home</a>
      <a href="/discover" class="nav-link">Discover</a>
      <a href="/hype" class="nav-link">HYPE</a>
      <a href="/tickets" class="nav-link">Shows</a>
      <a href="/promise" class="nav-link">The Promise</a>
    </div>
  </div>
  <div class="nav-right">
    <button class="a11y-btn" id="openA11y"><span aria-hidden="true">⊙</span><span>Accessibility</span></button>
    <button class="role-pill fan"><span class="av">·</span><span class="name">…</span><span class="ctx">▾</span></button>
  </div>
</nav>

<div class="page">

  <!-- GREETING -->
  <div class="greeting-card">
    <div class="greeting-av fan" id="greeting-av">·</div>
    <div style="flex:1">
      <div class="greeting-name" id="greeting-name">
        <span class="skeleton" style="display:inline-block;width:200px;height:1.3rem;border-radius:4px"></span>
      </div>
      <div class="greeting-sub" id="greeting-sub">Loading your dashboard…</div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions" id="quick-actions" style="display:none"></div>

  <!-- STATS TILES -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-tile"><div class="skeleton" style="height:1.8rem;width:60px;margin-bottom:.4rem"></div><div class="skeleton" style="height:.65rem;width:80px;border-radius:4px"></div></div>
    <div class="stat-tile"><div class="skeleton" style="height:1.8rem;width:60px;margin-bottom:.4rem"></div><div class="skeleton" style="height:.65rem;width:80px;border-radius:4px"></div></div>
    <div class="stat-tile"><div class="skeleton" style="height:1.8rem;width:60px;margin-bottom:.4rem"></div><div class="skeleton" style="height:.65rem;width:80px;border-radius:4px"></div></div>
    <div class="stat-tile"><div class="skeleton" style="height:1.8rem;width:60px;margin-bottom:.4rem"></div><div class="skeleton" style="height:.65rem;width:80px;border-radius:4px"></div></div>
  </div>

  <div class="home-grid">
    <!-- LEFT COLUMN -->
    <div>

      <!-- SHOWS -->
      <div class="home-section">
        <div class="section-head">
          <span id="shows-label">Upcoming shows</span>
          <a href="/tickets">View all →</a>
        </div>
        <div id="shows-list" class="shows-list">
          <div class="skeleton" style="height:68px;border-radius:var(--r-md)"></div>
          <div class="skeleton" style="height:68px;border-radius:var(--r-md);opacity:.7;margin-top:.55rem"></div>
          <div class="skeleton" style="height:68px;border-radius:var(--r-md);opacity:.4;margin-top:.55rem"></div>
        </div>
      </div>

      <!-- GEO (creators only) -->
      <div class="home-section" id="geo-section" style="display:none">
        <div class="section-head"><span>Audience by region</span></div>
        <div id="geo-list" class="geo-list"></div>
      </div>

    </div>

    <!-- SIDEBAR -->
    <div>
      <!-- Detail stats -->
      <div class="side-card" id="detail-stats" style="display:none">
        <div class="side-card-title" id="detail-stats-title">Your stats</div>
        <div class="kv-rows" id="detail-stats-rows"></div>
      </div>

      <!-- Navigation -->
      <div class="side-card">
        <div class="side-card-title">Navigate</div>
        <div id="sidebar-links"></div>
      </div>
    </div>
  </div>

</div>
</div><!-- /site-shell -->

<script src="/ihype-user-menu.js" defer></script>
<script>
(function(){
  function rc(role){ const r=String(role||'').toUpperCase(); if(r==='ARTIST')return'artist'; if(r==='VENUE')return'venue'; if(r==='DJ'||r==='PROMOTER')return'promoter'; return'fan'; }
  function rl(role){ const r=String(role||'').toUpperCase(); if(r==='ARTIST')return'Artist'; if(r==='VENUE')return'Venue'; if(r==='DJ')return'Promoter'; if(r==='ADMIN')return'Admin'; return'Fan'; }
  function ini(n,e){ return((n&&n.trim())||(e&&e.trim())||'?').charAt(0).toUpperCase(); }
  function greet(){ const h=new Date().getHours(); if(h<12)return'Good morning'; if(h<17)return'Good afternoon'; return'Good evening'; }
  function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmt(n){ if(n>=1000000)return(n/1000000).toFixed(1)+'M'; if(n>=1000)return(n/1000).toFixed(1)+'k'; return String(n||0); }
  function fmtMoney(cents){ return'$'+(cents/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtDate(iso){ if(!iso)return null; const d=new Date(iso); return{day:d.getDate(),mon:d.toLocaleString('default',{month:'short'}),full:d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}; }
  function isCreator(role){ return['ARTIST','DJ','VENUE'].includes(String(role||'').toUpperCase()); }

  function renderGreeting(user){
    const cls=rc(user.role);
    const display=user.name||(user.email?user.email.split('@')[0]:'there');
    document.getElementById('greeting-av').className='greeting-av '+cls;
    document.getElementById('greeting-av').textContent=ini(user.name,user.email);
    document.getElementById('greeting-name').innerHTML=greet()+', <strong>'+esc(display)+'</strong><span class="role-badge '+cls+'">'+rl(user.role)+'</span>';
    document.getElementById('greeting-sub').textContent='Here\'s everything happening on your account.';
  }

  function renderQuickActions(role){
    const r=String(role||'').toUpperCase();
    const actions=[];
    if(r==='ARTIST'||r==='DJ'||r==='VENUE') actions.push({href:'/show-creator',label:'Create a show',icon:'＋',primary:true});
    actions.push({href:'/discover',label:'Discover',icon:'◎'});
    actions.push({href:'/hype',label:'HYPE engine',icon:'★'});
    actions.push({href:'/tickets',label:r==='FAN'?'Browse shows':'My shows',icon:'🎟'});
    actions.push({href:'/customizer',label:'Customize page',icon:'✦'});
    const el=document.getElementById('quick-actions');
    el.innerHTML=actions.map(a=>'<a href="'+a.href+'" class="qa-btn'+(a.primary?' primary':'')+'">'+a.icon+' '+esc(a.label)+'</a>').join('');
    el.style.display='flex';
  }

  function renderStatTile(num, numClass, label, sub){
    return '<div class="stat-tile"><div class="num '+numClass+'">'+esc(num)+'</div><div class="lbl">'+esc(label)+'</div>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>';
  }

  function renderStats(stats){
    const role=String(stats.role||'').toUpperCase();
    const el=document.getElementById('stats-grid');
    let tiles=[];

    if(isCreator(stats.role)){
      const sh=stats.showStats||{};
      const tk=stats.ticketStats||{};
      const ea=stats.earningsStats||{};
      tiles=[
        renderStatTile(fmt(stats.hype.received),'','HYPE received','across all profiles & shows'),
        renderStatTile(fmt(sh.total||0),'blue','Shows created',sh.live>0?sh.live+' live now':sh.scheduled+' scheduled'),
        renderStatTile(fmt(tk.sold||sh.ticketsSold||0),'green','Tickets sold',sh.capacity>0?'of '+fmt(sh.capacity)+' capacity':''),
        renderStatTile(fmtMoney(ea.releasedCents||0),'gold','Earnings released','from ticket payouts'),
      ];
      // Detail stats sidebar
      const rows=[
        ['Shows live', sh.live||0],
        ['Shows scheduled', sh.scheduled||0],
        ['Shows ended', sh.ended||0],
        ['Shows draft', sh.draft||0],
        ['Ticketed shows', sh.ticketed||0],
        ['Tickets sold', fmt(tk.sold||sh.ticketsSold||0)],
        ['Payout released', fmtMoney(ea.releasedCents||0)],
        ['HYPE given', fmt(stats.hype.given)],
        ['HYPE received', fmt(stats.hype.received)],
        ['Song plays', fmt(stats.plays.songs)],
        ['Show listens', fmt(stats.plays.shows)],
      ];
      renderDetailStats(role==='VENUE'?'Venue stats':role==='DJ'?'Promoter stats':'Artist stats', rows);
    } else {
      // FAN
      const fan=stats.fanStats||{};
      tiles=[
        renderStatTile(fmt(stats.hype.given),'','HYPE given','to artists, venues & shows'),
        renderStatTile(fmt(fan.songsCompleted||stats.plays.songs||0),'blue','Songs played','completed listens'),
        renderStatTile(fmt(fan.showsCompleted||stats.plays.shows||0),'','Shows watched','completed playbacks'),
        renderStatTile(fmt(fan.ticketsBought||0),'green','Tickets bought','across '+fmt(fan.showsAttended||0)+' events'),
      ];
      const rows=[
        ['HYPE given', fmt(stats.hype.given)],
        ['HYPE received', fmt(stats.hype.received)],
        ['HYPE rating', fmt(stats.hype.rating)],
        ['Songs played', fmt(stats.plays.songs)],
        ['Songs finished', fmt(fan.songsCompleted||0)],
        ['Shows watched', fmt(stats.plays.shows)],
        ['Shows finished', fmt(fan.showsCompleted||0)],
        ['Tickets bought', fmt(fan.ticketsBought||0)],
        ['Events attended', fmt(fan.showsAttended||0)],
      ];
      renderDetailStats('Your stats', rows);
    }

    el.innerHTML=tiles.join('');
  }

  function renderDetailStats(title, rows){
    document.getElementById('detail-stats-title').textContent=title;
    document.getElementById('detail-stats-rows').innerHTML=rows.map(([k,v])=>
      '<div class="kv-row"><span class="k">'+esc(String(k))+'</span><span class="v">'+esc(String(v))+'</span></div>'
    ).join('');
    document.getElementById('detail-stats').style.display='';
  }

  function renderGeo(geoStats, role){
    if(!geoStats||!geoStats.length||!isCreator(role)){ return; }
    const max=geoStats[0].count||1;
    const section=document.getElementById('geo-section');
    const list=document.getElementById('geo-list');
    section.style.display='';
    list.innerHTML=geoStats.map(g=>{
      const label=(g.region&&g.region!=='Unknown'?g.region:(g.country||'Unknown'));
      const country=g.country&&g.country!=='Unknown'?' · '+g.country:'';
      const pct=Math.round((g.count/max)*100);
      return '<div class="geo-row"><div class="geo-label" title="'+esc(label+country)+'">'+esc(label)+'</div>'+
        '<div class="geo-track"><div class="geo-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="geo-count">'+g.count+'</div></div>';
    }).join('');
  }

  function renderShows(shows, role){
    const r=String(role||'').toUpperCase();
    const el=document.getElementById('shows-list');
    const label=document.getElementById('shows-label');
    const display=shows.slice(0,8);

    if(r==='ARTIST'||r==='DJ'||r==='VENUE') label.textContent='Your shows';

    if(!display.length){
      el.innerHTML='<div class="empty-state">No upcoming shows.'+(isCreator(role)?'<br><a href="/show-creator" style="color:var(--accent);text-decoration:none;font-weight:500">Create your first →</a>':'')+'</div>';
      return;
    }
    el.innerHTML=display.map(s=>{
      const d=fmtDate(s.startsAt);
      const isLive=s.status==='LIVE'; const isDraft=s.status==='DRAFT';
      const venue=s.venueProfile?esc(s.venueProfile.name||''):'';
      const headliner=s.headlinerProfile?esc(s.headlinerProfile.name||''):'';
      const meta=[headliner,venue].filter(Boolean).join(' · ')||esc(s.description||'');
      return '<a class="show-card" href="/shows/'+esc(s.slug)+'">'+
        '<div class="show-date"><div class="day">'+(d?d.day:'?')+'</div><div class="mon">'+(d?d.mon:'')+'</div></div>'+
        '<div class="show-info"><div class="nm">'+esc(s.title)+'</div><div class="mt">'+meta+(d?' · '+d.full:'')+'</div></div>'+
        '<span class="badge'+(isLive?' live':isDraft?' draft':s.isTicketed?' ticketed':'')+'">'+
          (isLive?'Live':isDraft?'Draft':s.isTicketed?'Ticketed':'Free')+
        '</span></a>';
    }).join('');
  }

  function renderSidebarLinks(role){
    const r=String(role||'').toUpperCase();
    const links=[
      ...(isCreator(role)?[{href:'/show-creator',ico:'＋',label:'Create a show'}]:[]),
      {href:'/discover',ico:'◎',label:'Discover'},
      {href:'/hype',ico:'★',label:'HYPE engine'},
      {href:'/tickets',ico:'🎟',label:'Shows'},
      {href:'/customizer',ico:'✦',label:'Customize page'},
      {href:'/promise',ico:'◈',label:'The Promise'},
    ];
    document.getElementById('sidebar-links').innerHTML=links.map(l=>
      '<a href="'+l.href+'" class="nav-link-item"><span class="ico">'+l.ico+'</span>'+esc(l.label)+'</a>'
    ).join('');
  }

  async function init(){
    // Session
    let user;
    try{
      const res=await fetch('/api/auth/session',{credentials:'same-origin'});
      const data=await res.json();
      if(!data||!data.user){window.location.href='/login';return;}
      user=data.user;
    }catch(e){window.location.href='/login';return;}

    renderGreeting(user);
    renderQuickActions(user.role);
    renderSidebarLinks(user.role);

    // Fetch stats and shows in parallel
    const [statsRes, showsRes] = await Promise.allSettled([
      fetch('/api/stats/me',{credentials:'same-origin'}),
      fetch('/api/shows',{credentials:'same-origin'})
    ]);

    if(statsRes.status==='fulfilled'&&statsRes.value.ok){
      try{
        const stats=await statsRes.value.json();
        renderStats(stats);
        renderGeo(stats.geoStats, user.role);
      }catch(e){
        document.getElementById('stats-grid').innerHTML='<div style="color:var(--ink-3);font-size:.82rem;grid-column:1/-1">Stats unavailable.</div>';
      }
    }

    if(showsRes.status==='fulfilled'&&showsRes.value.ok){
      try{
        const shows=await showsRes.value.json();
        renderShows(Array.isArray(shows)?shows:[],user.role);
      }catch(e){
        document.getElementById('shows-list').innerHTML='<div class="empty-state">Could not load shows.</div>';
      }
    } else {
      document.getElementById('shows-list').innerHTML='<div class="empty-state">Could not load shows.</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
