<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile · iHYPE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ihype-shared.css">
<style>
/* ── Hero ───────────────────────────────────────────────────── */
.profile-hero{position:relative;padding:2.4rem 0 2rem;border-bottom:1px solid var(--line);margin-bottom:2rem}
.profile-hero-inner{display:flex;align-items:flex-start;gap:1.8rem;flex-wrap:wrap}
.profile-avatar{width:84px;height:84px;border-radius:var(--r-lg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-d);font-size:2rem;font-weight:800;color:#fff}
.profile-avatar.artist{background:linear-gradient(135deg,#d83a16,#e89060)}
.profile-avatar.promoter{background:linear-gradient(135deg,#7a4fb5,#c08fe8)}
.profile-avatar.venue{background:linear-gradient(135deg,#1f8782,#7fc4c0)}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.profile-meta{flex:1;min-width:0}
.profile-name{font-family:var(--f-d);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;color:var(--ink);line-height:1.1;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap;margin-bottom:.5rem}
.profile-verified{color:var(--r-venue);font-size:1rem}
.profile-headline{font-size:1rem;color:var(--ink-2);margin-bottom:.75rem;line-height:1.5;max-width:520px}
.profile-chips{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}
.profile-location{font-family:var(--f-m);font-size:.74rem;color:var(--ink-3)}
.profile-hype{font-family:var(--f-m);font-size:.74rem;color:var(--accent);font-weight:600}

/* ── Layout ─────────────────────────────────────────────────── */
.profile-layout{display:grid;grid-template-columns:1fr 280px;gap:1.5rem;align-items:start}

/* ── Sections ───────────────────────────────────────────────── */
.profile-section{margin-bottom:1.8rem}
.profile-section-title{font-family:var(--f-m);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem}
.profile-section-title::after{content:'';flex:1;height:1px;background:var(--line)}
.profile-bio{font-size:.95rem;color:var(--ink-2);line-height:1.7;white-space:pre-wrap}

/* ── Shows ──────────────────────────────────────────────────── */
.show-card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);padding:.9rem 1.1rem;display:grid;grid-template-columns:1fr auto;gap:.65rem;align-items:start;text-decoration:none;color:inherit;transition:border-color .14s}
.show-card:hover{border-color:var(--line-2)}
.show-title{font-family:var(--f-d);font-size:.95rem;font-weight:600;color:var(--ink);margin-bottom:.25rem}
.show-meta{font-family:var(--f-m);font-size:.72rem;color:var(--ink-3);line-height:1.5}
.show-badges{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.s-badge{font-family:var(--f-m);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:.18rem .5rem;border-radius:99px;border:1px solid;white-space:nowrap}
.s-badge.live{color:var(--accent);border-color:rgba(255,80,41,.3);background:rgba(255,80,41,.08)}
.s-badge.scheduled{color:var(--r-venue);border-color:rgba(34,229,212,.3);background:rgba(34,229,212,.06)}
.s-badge.radio{color:var(--r-fan);border-color:rgba(185,131,255,.3);background:rgba(185,131,255,.06)}
.s-badge.ticketed{color:var(--ink-2);border-color:var(--line-2)}

/* ── Songs ──────────────────────────────────────────────────── */
.track-row{display:grid;grid-template-columns:28px 1fr auto;gap:.65rem;align-items:center;padding:.6rem .75rem;border-radius:var(--r-sm);background:var(--bg-2);border:1px solid var(--line);margin-bottom:.35rem;transition:border-color .14s}
.track-row:hover{border-color:var(--line-2)}
.track-num{font-family:var(--f-m);font-size:.74rem;color:var(--ink-4);text-align:center}
.track-title{font-size:.88rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-sub{font-family:var(--f-m);font-size:.7rem;color:var(--ink-3);margin-top:.08rem}
.free-badge{font-family:var(--f-m);font-size:.6rem;padding:.14rem .42rem;border-radius:99px;background:rgba(34,229,212,.08);border:1px solid rgba(34,229,212,.25);color:var(--r-venue);font-weight:600;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar-card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.1rem 1.2rem;margin-bottom:1rem}
.sidebar-title{font-family:var(--f-m);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:.75rem}
.sidebar-row{display:flex;gap:.6rem;align-items:flex-start;padding:.45rem 0;border-bottom:1px solid var(--line);font-size:.85rem}
.sidebar-row:last-child{border-bottom:none;padding-bottom:0}
.sidebar-row:first-of-type{padding-top:0}
.sidebar-icon{font-size:.9rem;flex-shrink:0;margin-top:.05rem}
.sidebar-val{color:var(--ink-2);line-height:1.4}
.hype-count-big{font-family:var(--f-d);font-size:2rem;font-weight:700;color:var(--accent);letter-spacing:-.02em;line-height:1}
.hype-label{font-family:var(--f-m);font-size:.7rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.12em;margin-top:.25rem}

/* ── Genre pills ────────────────────────────────────────────── */
.genre-wrap{display:flex;flex-wrap:wrap;gap:.4rem}
.genre-pill{padding:.26rem .65rem;border-radius:99px;font-family:var(--f-m);font-size:.74rem;font-weight:500;background:var(--bg-2);border:1px solid var(--line-2);color:var(--ink-2);text-decoration:none;display:inline-block;transition:all .13s}
.genre-pill:hover{border-color:var(--ink-3);color:var(--ink)}

/* ── HYPE button ────────────────────────────────────────────── */
.hype-btn-wrap{margin-top:.75rem}
.hype-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.55rem 1.3rem;border-radius:99px;font-family:var(--f-d);font-size:.88rem;font-weight:700;letter-spacing:.01em;cursor:pointer;transition:all .18s;border:2px solid var(--accent);background:transparent;color:var(--accent);white-space:nowrap}
.hype-btn:hover:not(:disabled){background:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,80,41,.28)}
.hype-btn:active:not(:disabled){transform:translateY(0)}
.hype-btn.hyped{background:color-mix(in srgb,var(--accent) 12%,transparent);border-color:color-mix(in srgb,var(--accent) 35%,transparent);color:var(--accent);cursor:default}
.hype-btn:disabled{opacity:.65;cursor:default}
.hype-btn-arrow{font-size:1rem;transition:transform .18s}
.hype-btn:hover:not(:disabled) .hype-btn-arrow,.hype-btn.hyped .hype-btn-arrow{transform:translateY(-2px)}
@keyframes hype-pop{0%{transform:scale(1)}40%{transform:scale(1.22)}80%{transform:scale(.95)}100%{transform:scale(1)}}
.hype-count-pop{animation:hype-pop .35s ease forwards}

/* ── Skeleton ───────────────────────────────────────────────── */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);background-size:200% 100%;animation:skel-shimmer 1.4s ease infinite;border-radius:var(--r-md)}
@keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Not found ──────────────────────────────────────────────── */
.not-found{padding:5rem 0;text-align:center;color:var(--ink-3)}
.not-found .big{font-size:3rem;margin-bottom:1rem}
.not-found p{font-size:.96rem;max-width:340px;margin:.5rem auto 1.5rem}

/* ── Empty state ────────────────────────────────────────────── */
.empty-state{padding:2rem 0;text-align:center;color:var(--ink-3);font-size:.88rem}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:760px){
  .profile-layout{grid-template-columns:1fr}
  .profile-sidebar{order:3}
}
@media(max-width:520px){
  .profile-hero-inner{gap:1.1rem}
  .profile-avatar{width:64px;height:64px;font-size:1.5rem}
}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<div class="site-shell">
<nav class="nav">
  <div class="nav-left">
    <a href="/" style="text-decoration:none;color:inherit"><div class="brand">i<em>HYPE</em></div></a>
    <span style="font-family:var(--f-m);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:.2rem .5rem;border-radius:99px;background:rgba(255,80,41,.1);border:1px solid rgba(255,80,41,.22);color:var(--accent)">Beta</span>
  </div>
  <div class="nav-right">
    <button class="role-pill fan"><span class="av">·</span><span class="name">…</span><span class="ctx">▾</span></button>
  </div>
</nav>

<div class="page">
  <!-- Skeleton while loading -->
  <div id="profileSkeleton">
    <div style="display:flex;gap:1.5rem;align-items:flex-start;padding:2rem 0 1.5rem;border-bottom:1px solid var(--line);margin-bottom:2rem;flex-wrap:wrap">
      <div class="skel" style="width:84px;height:84px;border-radius:var(--r-lg);flex-shrink:0"></div>
      <div style="flex:1;min-width:180px">
        <div class="skel" style="height:2rem;width:240px;margin-bottom:.75rem"></div>
        <div class="skel" style="height:.85rem;width:340px;margin-bottom:.5rem"></div>
        <div class="skel" style="height:.75rem;width:180px"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:1.5rem">
      <div>
        <div class="skel" style="height:80px;margin-bottom:1rem"></div>
        <div class="skel" style="height:120px"></div>
      </div>
      <div>
        <div class="skel" style="height:140px;border-radius:var(--r-lg)"></div>
      </div>
    </div>
  </div>

  <!-- Profile content -->
  <div id="profileContent" style="display:none"></div>

  <!-- Not found -->
  <div id="profileNotFound" style="display:none" class="not-found">
    <div class="big">🔍</div>
    <p>This profile doesn't exist or hasn't been set up yet.</p>
    <a href="/search" class="btn btn-ghost btn-sm">Search iHYPE →</a>
  </div>
</div>
</div><!-- /site-shell -->

<script src="/ihype-shared.js" defer></script>
<script src="/ihype-user-menu.js" defer></script>
<script>
(function(){
  function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmt(n){ if(!n) return '0'; if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(n>=1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k'; return String(n); }
  function fmtDate(iso){ try{ return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }catch(e){ return ''; } }
  function fmtTime(iso){ try{ return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }

  const TYPE_LABEL = { ARTIST:'Artist', DJ:'Promoter', VENUE:'Venue' };
  const TYPE_CLASS = { ARTIST:'artist', DJ:'promoter', VENUE:'venue' };

  // Extract slug from pathname: /profile/:slug
  const slug = location.pathname.replace(/^\/profile\//, '').split('/')[0];

  if(!slug){
    show('profileNotFound');
    return;
  }

  fetch('/api/profile/'+encodeURIComponent(slug), {credentials:'same-origin'})
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => render(data))
    .catch(status => {
      hide('profileSkeleton');
      show('profileNotFound');
    });

  function show(id){ document.getElementById(id).style.display=''; }
  function hide(id){ document.getElementById(id).style.display='none'; }

  function render({ profile, shows, tracks }){
    hide('profileSkeleton');

    document.title = profile.name + ' · iHYPE';

    const typeClass = TYPE_CLASS[profile.type] || 'artist';
    const typeLabel = TYPE_LABEL[profile.type] || profile.type;
    const loc = [profile.city, profile.stateRegion, profile.country].filter(Boolean).join(', ');
    const initial = (profile.name||'?').charAt(0).toUpperCase();

    const avatarHTML = profile.avatarImage
      ? `<div class="profile-avatar ${typeClass}"><img src="${esc(profile.avatarImage)}" alt="${esc(profile.name)}" loading="lazy"></div>`
      : `<div class="profile-avatar ${typeClass}">${esc(initial)}</div>`;

    const genreChips = (profile.genres||[]).slice(0,8).map(g =>
      `<a href="/search?q=${encodeURIComponent(g)}&type=artist" class="genre-pill">${esc(g)}</a>`
    ).join('');

    const verifiedBadge = profile.verified ? '<span class="profile-verified" title="Verified">✓</span>' : '';

    // Shows HTML
    let showsHTML = '';
    if(shows.length){
      showsHTML = shows.map(s => {
        const date = s.startsAt ? fmtDate(s.startsAt) : 'TBD';
        const time = s.startsAt ? fmtTime(s.startsAt) : '';
        const venueName = s.venueProfile?.name || '';
        const venueCity = [s.venueProfile?.city, s.venueProfile?.stateRegion].filter(Boolean).join(', ');
        const metaParts = [date+(time?' · '+time:''), venueName||null, venueCity||null].filter(Boolean);
        const isLive = s.status==='LIVE';

        const badges = [
          isLive ? '<span class="s-badge live">Live now</span>' : '<span class="s-badge scheduled">Upcoming</span>',
          s.isRadioShow ? '<span class="s-badge radio">Radio</span>' : '',
          s.isTicketed ? '<span class="s-badge ticketed">Ticketed</span>' : '',
        ].filter(Boolean).join('');

        return `<a href="/shows/${esc(s.slug||'')}" class="show-card" style="margin-bottom:.45rem;display:grid">
          <div>
            <div class="show-title">${esc(s.title)}</div>
            <div class="show-meta">${esc(metaParts.join(' · '))}</div>
          </div>
          <div class="show-badges">${badges}</div>
        </a>`;
      }).join('');
    } else {
      showsHTML = '<div class="empty-state">No upcoming shows.</div>';
    }

    // Tracks HTML (artist only)
    let tracksHTML = '';
    if(profile.type==='ARTIST' && tracks.length){
      tracksHTML = `
        <div class="profile-section">
          <div class="profile-section-title">Free-use songs</div>
          ${tracks.map((t,i)=>`
            <div class="track-row">
              <div class="track-num">${i+1}</div>
              <div style="overflow:hidden">
                <div class="track-title">${esc(t.title)}</div>
                ${t.notes?`<div class="track-sub">${esc(t.notes.slice(0,60))}</div>`:''}
              </div>
              <span class="free-badge">Free use</span>
            </div>`).join('')}
        </div>`;
    }

    // Venue-specific details
    let venueDetailsHTML = '';
    if(profile.type==='VENUE'){
      const details = [
        profile.addressLine1 ? ['📍', profile.addressLine1+(loc?', '+loc:'')] : null,
        profile.hoursText    ? ['🕐', profile.hoursText] : null,
        profile.contactInfo  ? ['📞', profile.contactInfo] : null,
        profile.parkingDetails ? ['🅿️', profile.parkingDetails.slice(0,120)] : null,
      ].filter(Boolean);
      if(details.length){
        venueDetailsHTML = `
          <div class="profile-section">
            <div class="profile-section-title">Venue info</div>
            ${details.map(([icon,val])=>`
              <div class="sidebar-row">
                <span class="sidebar-icon">${icon}</span>
                <span class="sidebar-val">${esc(val)}</span>
              </div>`).join('')}
          </div>`;
      }
    }

    const showsLabel = profile.type==='VENUE' ? 'Upcoming shows here' : 'Upcoming shows';

    const html = `
      <div class="profile-hero">
        <nav aria-label="Breadcrumb" style="font-family:var(--f-m);font-size:.74rem;color:var(--ink-3);margin-bottom:1.2rem">
          <a href="/search" style="color:var(--ink-3);text-decoration:none">Search</a>
          <span style="margin:0 .4rem">›</span>
          <span>${esc(typeLabel)}s</span>
        </nav>
        <div class="profile-hero-inner">
          ${avatarHTML}
          <div class="profile-meta">
            <div class="profile-name">
              ${esc(profile.name)} ${verifiedBadge}
              <span class="tag tag-${typeClass}" style="font-size:.62rem">${esc(typeLabel)}</span>
            </div>
            ${profile.headline ? `<div class="profile-headline">${esc(profile.headline)}</div>` : ''}
            <div class="profile-chips">
              ${genreChips}
              ${loc ? `<span class="profile-location">📍 ${esc(loc)}</span>` : ''}
              ${profile.hypeCount ? `<span class="profile-hype">▲ ${fmt(profile.hypeCount)} HYPE</span>` : ''}
            </div>
          </div>
        </div>
      </div>

      <div class="profile-layout">
        <div>
          ${profile.bio||profile.aboutContent ? `
            <div class="profile-section">
              <div class="profile-section-title">About</div>
              <p class="profile-bio">${esc(profile.bio||profile.aboutContent||'')}</p>
            </div>` : ''}

          ${venueDetailsHTML}
          ${tracksHTML}

          <div class="profile-section">
            <div class="profile-section-title">${esc(showsLabel)}</div>
            ${showsHTML}
          </div>
        </div>

        <aside class="profile-sidebar">
          <div class="sidebar-card" style="text-align:center">
            <div class="hype-count-big" id="hype-count-display">${fmt(profile.hypeCount)}</div>
            <div class="hype-label">HYPE</div>
            <div class="hype-btn-wrap">
              <button id="hype-btn" class="hype-btn" type="button" aria-label="HYPE ${esc(profile.name)}">
                <span class="hype-btn-arrow">▲</span><span id="hype-btn-label">HYPE this</span>
              </button>
            </div>
          </div>

          ${profile.genres && profile.genres.length ? `
            <div class="sidebar-card">
              <div class="sidebar-title">Genres</div>
              <div class="genre-wrap">
                ${(profile.genres||[]).map(g=>
                  `<a href="/search?q=${encodeURIComponent(g)}&type=artist" class="genre-pill">${esc(g)}</a>`
                ).join('')}
              </div>
            </div>` : ''}

          <div class="sidebar-card">
            <div class="sidebar-title">Explore</div>
            <a href="/discover" class="refine-link" style="display:block;font-size:.82rem;color:var(--ink-2);text-decoration:none;padding:.4rem 0;border-bottom:1px solid var(--line);transition:color .12s">Recommendation Engine →</a>
            <a href="/tickets" class="refine-link" style="display:block;font-size:.82rem;color:var(--ink-2);text-decoration:none;padding:.4rem 0;transition:color .12s">Browse shows →</a>
          </div>
        </aside>
      </div>`;

    document.getElementById('profileContent').innerHTML = html;
    show('profileContent');
    wireHypeButton(profile.id, profile.name);
  }

  // ── HYPE button logic ─────────────────────────────────────────────────────
  function wireHypeButton(profileId, profileName) {
    const btn       = document.getElementById('hype-btn');
    const countEl   = document.getElementById('hype-count-display');
    const labelEl   = document.getElementById('hype-btn-label');
    if (!btn || !countEl || !labelEl) return;

    let hyped = false;
    let working = false;

    btn.addEventListener('click', async function () {
      if (hyped || working) return;
      working = true;
      btn.disabled = true;
      labelEl.textContent = 'Hyping…';

      try {
        const res = await fetch('/api/hype', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ targetType: 'profile', targetId: profileId })
        });

        if (res.status === 401) {
          // Not logged in — send to login then back
          window.location.href = '/login?next=' + encodeURIComponent(location.pathname);
          return;
        }

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          // Update count display
          const newCount = data.hypeCount ?? 0;
          countEl.textContent = fmt(newCount);
          countEl.classList.remove('hype-count-pop');
          // Force reflow so animation re-triggers
          void countEl.offsetWidth;
          countEl.classList.add('hype-count-pop');

          hyped = true;
          btn.classList.add('hyped');
          btn.disabled = false;
          working = false;

          if (data.created) {
            labelEl.textContent = 'Hyped ✓';
            btn.setAttribute('aria-label', 'You hyped ' + profileName);
          } else {
            // Already hyped before this session
            labelEl.textContent = 'Already hyped';
          }
        } else {
          // Unexpected error — reset button
          labelEl.textContent = 'HYPE this';
          btn.disabled = false;
          working = false;
        }
      } catch {
        labelEl.textContent = 'HYPE this';
        btn.disabled = false;
        working = false;
      }
    });
  }
})();
</script>
</body>
</html>
