name = "ihype-cron"
compatibility_date = "2026-05-24"
main = "workers/cron.ts"

[vars]
APP_BASE_URL = "https://ihype.org"

# CRON_SECRET must be set as a secret:
#   wrangler secret put CRON_SECRET --config wrangler.cron.toml

[triggers]
crons = [
  "* * * * *",    # show-lifecycle (every minute)
  "*/5 * * * *"   # expire-reservations (every 5 minutes)
]
